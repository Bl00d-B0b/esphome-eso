# Example device — local self-test of the ESO P1 packages.
# The packages are sensors-only, so the device provides the component + hub here.
substitutions:
  name: eso
  uart_rx_pin: D7
  request_pin: D5

esphome:
  name: ${name}
  friendly_name: ESO Sensor

esp8266:
  board: d1_mini
  restore_from_flash: true

logger:
  baud_rate: 0   # UART0 is used by the P1 reader

api:
ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Local component (this repo). Consumers pull it from GitHub instead — see README.
external_components:
  - source:
      type: local
      path: components
    components: [dsmr_eso]

uart:
  rx_pin: ${uart_rx_pin}
  baud_rate: 115200
  rx_buffer_size: 3072

dsmr_eso:
  id: dsmr_instance
  request_pin: ${request_pin}
  request_interval: 10s
  max_telegram_length: 4096

# Pick the profile/phase package to test:
packages:
  sensors: !include packages/p1_max_3f.yaml
