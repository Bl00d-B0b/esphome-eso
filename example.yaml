# Example device using the self-contained ESO P1 (Maksimalus) package.
# Provides the base (board/wifi/api/ota/logger); the package adds the meter sensors.
substitutions:
  name: eso
  uart_rx_pin: D7
  request_pin: D5

esphome:
  name: ${name}
  friendly_name: ESO Sensor

esp8266:
  board: d1_mini
  restore_from_flash: true

logger:
  baud_rate: 0   # UART0 is used by the P1 reader

api:
ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

packages:
  dsmr: !include packages/dsmr_eso_max.yaml
