      id: electricity_sags_l3
      entity_category: "diagnostic"
    # 1-0:32.36.0 — Number of voltage swells in phase L1
    electricity_swells_l1:
      name: "Electricity Swells L1"
      id: electricity_swells_l1
      entity_category: "diagnostic"
    # 1-0:52.36.0 — Number of voltage swells in phase L2
    electricity_swells_l2:
      name: "Electricity Swells L2"
      id: electricity_swells_l2
      entity_category: "diagnostic"
    # 1-0:72.36.0 — Number of voltage swells in phase L3
    electricity_swells_l3:
      name: "Electricity Swells L3"
      id: electricity_swells_l3
      entity_category: "diagnostic"

text_sensor:
  - platform: dsmr
    # 0-0:1.0.0 — Clock
    # Kept internal (id only): feeds the "Meter Last Update" template and the
    # device display; not exposed as its own entity (use Meter Last Update).
    timestamp:
      id: timestamp
      internal: true
    # header — DSMR Identification
    identification:
      name: "DSMR Identification"
      id: identification
      entity_category: "diagnostic"
    # 0-0:96.1.1 — Equipment identifier
    equipment_id:
      name: "Equipment Identifier"
      id: equipment_id
      entity_category: "diagnostic"
    # 0-0:96.13.0 — Consumer Message Text
    message_long:
      name: "Consumer Message"
      id: message_long
      entity_category: "diagnostic"
  # ── Calculated: ISO-8601 "last update" from the meter clock ──────────────
  # Converts the raw DSMR clock (0-0:1.0.0, "YYMMDDHHmmssX") into a proper
  # `timestamp` device_class. UTC offset comes from the DST flag X in the
  # telegram (Lithuania EET/EEST): S = summer = +03:00, W = winter = +02:00.
  # Self-contained — depends only on id(timestamp) above, no time source needed.
  - platform: template
    name: "Meter Last Update"
    entity_category: "diagnostic"
    device_class: timestamp
    update_interval: 10s
    lambda: |-
      std::string ts = id(timestamp).state;
      if (ts.length() >= 13) {
        const char *off = (ts[12] == 'S') ? "+03:00" : "+02:00";
        char buf[32];
        snprintf(buf, sizeof(buf), "20%c%c-%c%c-%c%cT%c%c:%c%c:%c%c%s",
          ts[0], ts[1], ts[2], ts[3], ts[4], ts[5],
          ts[6], ts[7], ts[8], ts[9], ts[10], ts[11], off);
        return std::string(buf);
      }
      return std::string{};
