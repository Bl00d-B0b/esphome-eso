      id: reactive_power_returned_l3
    # 1-0:32.7.0 — Instantaneous voltage L1
    voltage_l1:
      name: "Voltage L1"
      id: voltage_l1
    # 1-0:31.7.0 — Instantaneous current L1
    current_l1:
      name: "Current L1"
      id: current_l1
    # 1-0:52.7.0 — Instantaneous voltage L2
    voltage_l2:
      name: "Voltage L2"
