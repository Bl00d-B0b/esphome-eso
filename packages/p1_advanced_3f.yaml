      id: power_factor_l1
    # 1-0:53.7.0 — Instantaneous power factor in phase L2
    power_factor_l2:
      name: "Power Factor L2"
      id: power_factor_l2
    # 1-0:73.7.0 — Instantaneous power factor in phase L3
    power_factor_l3:
      name: "Power Factor L3"
      id: power_factor_l3
    # 0-0:96.7.21 — Number of power failures in any phase
    electricity_failures:
      name: "Electricity Failures"
      id: electricity_failures
      entity_category: "diagnostic"
    # 1-0:32.32.0 — Number of voltage sags in phase L1
    electricity_sags_l1:
      name: "Electricity Sags L1"
      id: electricity_sags_l1
      entity_category: "diagnostic"
    # 1-0:52.32.0 — Number of voltage sags in phase L2
    electricity_sags_l2:
      name: "Electricity Sags L2"
      id: electricity_sags_l2
      entity_category: "diagnostic"
    # 1-0:72.32.0 — Number of voltage sags in phase L3
    electricity_sags_l3:
