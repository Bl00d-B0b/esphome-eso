# ESO P1 — Išplėstinis, 3F — sensor package (sensors only).
# Maintained at github://Bl00d-B0b/esphome-eso. Pure sensor/text_sensor lists for ESPHome's
# built-in `dsmr:` component. The consumer device declares uart + dsmr hub.
# Counters in this profile: 38 sensor + 4 text = 42.

sensor:
  - platform: dsmr
    energy_delivered_lux:
      name: "Energy Delivered Total"
      id: energy_delivered
    energy_delivered_tariff1:
      name: "Energy Delivered T#1"
      id: energy_delivered_t1
    energy_delivered_tariff2:
      name: "Energy Delivered T#2"
      id: energy_delivered_t2
    energy_delivered_tariff3:
      name: "Energy Delivered T#3"
      id: energy_delivered_t3
    energy_delivered_tariff4:
      name: "Energy Delivered T#4"
      id: energy_delivered_t4
    energy_returned_lux:
      name: "Energy Returned Total"
      id: energy_returned
    total_imported_energy:
      name: "Reactive Energy Imported Total"
      id: total_imported_energy
    total_exported_energy:
      name: "Reactive Energy Exported Total"
      id: total_exported_energy
    power_delivered_l1:
      name: "Power Delivered L1"
      id: power_delivered_l1
    power_delivered_l2:
      name: "Power Delivered L2"
      id: power_delivered_l2
    power_delivered_l3:
      name: "Power Delivered L3"
      id: power_delivered_l3
    power_returned_l1:
      name: "Power Returned L1"
      id: power_returned_l1
    power_returned_l2:
      name: "Power Returned L2"
      id: power_returned_l2
    power_returned_l3:
      name: "Power Returned L3"
      id: power_returned_l3
    reactive_power_delivered_l1:
      name: "Reactive Power Delivered L1"
      id: reactive_delivery_l1
      unit_of_measurement: "var"
      accuracy_decimals: 0
      filters:
        - multiply: 1000
    reactive_power_delivered_l2:
      name: "Reactive Power Delivered L2"
      id: reactive_delivery_l2
      unit_of_measurement: "var"
      accuracy_decimals: 0
      filters:
        - multiply: 1000
    reactive_power_delivered_l3:
      name: "Reactive Power Delivered L3"
      id: reactive_delivery_l3
      unit_of_measurement: "var"
      accuracy_decimals: 0
      filters:
        - multiply: 1000
    reactive_power_returned_l1:
      name: "Reactive Power Returned L1"
      id: reactive_return_l1
      unit_of_measurement: "var"
      accuracy_decimals: 0
      filters:
        - multiply: 1000
    reactive_power_returned_l2:
      name: "Reactive Power Returned L2"
      id: reactive_return_l2
      unit_of_measurement: "var"
      accuracy_decimals: 0
      filters:
        - multiply: 1000
    reactive_power_returned_l3:
      name: "Reactive Power Returned L3"
      id: reactive_return_l3
      unit_of_measurement: "var"
      accuracy_decimals: 0
      filters:
        - multiply: 1000
    voltage_l1:
      name: "Voltage L1"
      id: voltage_l1
    current_l1:
      name: "Current L1"
      id: current_l1
    voltage_l2:
      name: "Voltage L2"
      id: voltage_l2
    current_l2:
      name: "Current L2"
      id: current_l2
    voltage_l3:
      name: "Voltage L3"
      id: voltage_l3
    current_l3:
      name: "Current L3"
      id: current_l3
    frequency:
      name: "Frequency"
      id: grid_frequency
    power_factor:
      name: "Power Factor"
      id: power_factor
      filters:
        - multiply: 100
    power_factor_l1:
      name: "Power Factor L1"
      id: power_factor_l1
      filters:
        - multiply: 100
    power_factor_l2:
      name: "Power Factor L2"
      id: power_factor_l2
      filters:
        - multiply: 100
    power_factor_l3:
      name: "Power Factor L3"
      id: power_factor_l3
      filters:
        - multiply: 100
    electricity_failures:
      name: "Electricity Failures"
      id: electricity_failures
      entity_category: "diagnostic"
      icon: mdi:alert
    electricity_sags_l1:
      name: "Electricity Sags L1"
      id: electricity_sags_l1
      entity_category: "diagnostic"
    electricity_sags_l2:
      name: "Electricity Sags L2"
      id: electricity_sags_l2
      entity_category: "diagnostic"
    electricity_sags_l3:
      name: "Electricity Sags L3"
      id: electricity_sags_l3
      entity_category: "diagnostic"
    electricity_swells_l1:
      name: "Electricity Swells L1"
      id: electricity_swells_l1
      entity_category: "diagnostic"
    electricity_swells_l2:
      name: "Electricity Swells L2"
      id: electricity_swells_l2
      entity_category: "diagnostic"
    electricity_swells_l3:
      name: "Electricity Swells L3"
      id: electricity_swells_l3
      entity_category: "diagnostic"

text_sensor:
  - platform: dsmr
    timestamp:
      name: "Meter Timestamp"
      id: meter_timestamp_raw
      entity_category: "diagnostic"
    identification:
      name: "DSMR Identification"
      id: identification
      entity_category: "diagnostic"
    equipment_id:
      name: "Equipment Identifier"
      id: equipment_id
      entity_category: "diagnostic"
    message_long:
      name: "Consumer Message"
      id: message_long
      entity_category: "diagnostic"
