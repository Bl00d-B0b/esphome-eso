text_sensor:
  - platform: dsmr
    # 0-0:1.0.0 — Clock
    timestamp:
      name: "Meter Timestamp"
      id: timestamp
      entity_category: "diagnostic"
    # 1-0:0.2.0 — Active firmware identifier
    fw_core_version:
      name: "FW Core Version"
      id: fw_core_version
      entity_category: "diagnostic"
    # 1-1:0.2.0 — Active firmware identifier 1
    fw_module_version:
      name: "FW Module Version"
      id: fw_module_version
      entity_category: "diagnostic"
    # header — DSMR Identification
    identification:
      name: "DSMR Identification"
      id: identification
      entity_category: "diagnostic"
    # 0-0:96.1.1 — Equipment identifier
    equipment_id:
      name: "Equipment Identifier"
      id: equipment_id
      entity_category: "diagnostic"
    # 0-0:96.13.0 — Consumer Message Text
    message_long:
      name: "Consumer Message"
      id: message_long
      entity_category: "diagnostic"
    # 1-0:0.2.8 — Active firmware signature
    fw_core_checksum:
      name: "FW Core Checksum"
      id: fw_core_checksum
      entity_category: "diagnostic"
    # 1-1:0.2.8 — Active firmware signature 1
    fw_module_checksum:
      name: "FW Module Checksum"
      id: fw_module_checksum
      entity_category: "diagnostic"
